# Render.com deployment blueprint for the backend API.
# Push this repo to GitHub, then in Render: New -> Blueprint -> select this repo.
# Or manually create a Web Service pointing at the /backend folder with:
#   Build Command: npm install
#   Start Command: node server.js
services:
  - type: web
    name: ecommerce-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: CLIENT_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
